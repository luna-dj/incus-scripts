name: Regen from upstream

on:
  # Daily at 06:00 UTC (off-hours for most contributors)
  schedule:
    - cron: '0 6 * * *'
  # Manual trigger
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Regenerate all apps (skip "no changes" detection)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regenerate ct/ and install/ from upstream
        env:
          FORCE_ALL: ${{ inputs.force_all || 'false' }}
        run: |
          python3 scripts/regen-from-upstream.py 2>&1 | tee regen-output.log

      - name: Sync metadata from community-scripts.org
        if: always()
        run: |
          python3 scripts/sync-cs-metadata.py 2>&1 | tail -20 | tee -a regen-output.log

      - name: Sync app icons from selfhst/icons
        if: always()
        run: |
          python3 scripts/sync-icons.py 2>&1 | tail -20 | tee -a regen-output.log

      - name: Regenerate docs site
        # Re-run docs gen AFTER icons are downloaded so they can be embedded
        if: always()
        run: |
          if [[ -f gen_docs.sh ]]; then
            ./gen_docs.sh 2>&1 | tail -10 | tee -a regen-output.log
          else
            echo "No gen_docs.sh found, skipping doc regeneration" | tee -a regen-output.log
          fi

      - name: Show diff summary
        id: diff
        run: |
          {
            echo "## Files changed"
            echo
            git diff --stat | head -60
            echo
            echo "## Apps added (ct/)"
            git diff --diff-filter=A --name-only | grep '^ct/' | sed 's|^ct/||; s|\.sh$||' | head -20
            echo
            echo "## Apps removed (ct/)"
            git diff --diff-filter=D --name-only | grep '^ct/' | sed 's|^ct/||; s|\.sh$||' | head -20
            echo
            echo "## Doc pages added"
            git diff --diff-filter=A --name-only | grep '^docs/apps/' | sed 's|^docs/apps/||; s|\.html$||' | head -20
            echo
            echo "## Doc pages removed"
            git diff --diff-filter=D --name-only | grep '^docs/apps/' | sed 's|^docs/apps/||; s|\.html$||' | head -20
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected"
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true' && github.event_name == 'schedule'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: regen apps, docs, icons, and metadata from upstream"
          title: "Auto-regen: upstream ProxmoxVE sync"
          body: |
            Automated regeneration from
            [community-scripts/ProxmoxVE](https://github.com/community-scripts/ProxmoxVE)
            and [community-scripts.org](https://community-scripts.org).

            - `ct/` and `install/` mirrored from upstream install/* and tools/addon/*
            - `misc/app-categories.json` from official CS.org categories
            - `misc/community-scripts-data.json` (descriptions, install counts, has_arm)
            - `docs/assets/icons/` (540 selfhst icons) + `_mapping.json`
            - `docs/apps/*.html` regenerated with icons + install counts
            - `docs/index.html` regenerated with icons + descriptions + sort by popularity
            - `docs/apps.json` enriched with `icon` and `installs_30d` fields

            Daily cron runs at 06:00 UTC.

            ```
            $(cat regen-output.log)
            ```
          branch: auto/regen-upstream
          delete-branch: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit directly (manual dispatch)
        if: steps.check_changes.outputs.changed == 'true' && github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage ALL changes including docs (so generated HTML matches the
          # regen), but exclude transient cache files via .gitignore.
          git add -A
          # Unstage transient cache files if they slipped in
          git reset HEAD misc/.cs-meta-cache.tsv misc/.icon-cache.tsv docs/assets/icons/_failed.txt 2>/dev/null || true
          git status --short
          git commit -m "chore: regen apps, docs, icons, and metadata from upstream"
          git push

  mirror-to-codeberg:
    # Mirror to Codeberg so INCUS_BASE keeps working there.
    # Runs only after regen pushes to main (or on manual dispatch).
    needs: regen
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Mirror to Codeberg
        env:
          CODEBERG_SSH_KEY: ${{ secrets.CODEBERG_SSH_KEY }}
        run: |
          if [[ -z "$CODEBERG_SSH_KEY" ]]; then
            echo "No CODEBERG_SSH_KEY secret set; skipping Codeberg mirror"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$CODEBERG_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan codeberg.org >> ~/.ssh/known_hosts 2>/dev/null

          git remote add cb "git@codeberg.org:luna-dj/incus-scripts.git" 2>/dev/null || \
            git remote set-url cb "git@codeberg.org:luna-dj/incus-scripts.git"
          git push cb main
