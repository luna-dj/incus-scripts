<?xml version="1.0" encoding="UTF-8"?>
<!--
  incus-scripts logo
  ==================
  A container/containment ring (echoes the Incus "orbital" brand mark)
  bisected by a terminal prompt chevron. Reads as both "container" and
  "command line at a glance". Designed to be readable at 24px favicon
  size, 40px navbar size, and 200px hero size.

  Variants exported:
    - logo.svg           mark + wordmark, horizontal
    - logo-mark.svg      mark only (favicon, app icon)
    - logo-white.svg     monochrome white (for dark backgrounds, already dark by default)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" role="img" aria-label="incus-scripts">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="chevron" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#4c9b3f"/>
      <stop offset="100%" stop-color="#7cc668"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- Mark: containment ring + terminal chevron -->
  <g transform="translate(4,4)">
    <!-- Outer ring (Incus-echo) -->
    <circle cx="28" cy="28" r="26" fill="none" stroke="url(#ring)" stroke-width="3.5"/>
    <!-- Inner core dot -->
    <circle cx="28" cy="28" r="6" fill="url(#chevron)"/>
    <!-- Terminal chevron `>` bisecting the ring -->
    <path d="M 16 18 L 28 28 L 16 38"
          fill="none" stroke="#e6edf3" stroke-width="3.5"
          stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)"/>
    <!-- Blinking-cursor underscore -->
    <rect x="32" y="35" width="9" height="3" rx="1" fill="#e6edf3" filter="url(#soft)"/>
  </g>

  <!-- Wordmark: "incus scripts" -->
  <g transform="translate(76,0)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif">
    <text x="0" y="32" font-size="22" font-weight="700" fill="#e6edf3" letter-spacing="-0.5">incus</text>
    <text x="64" y="32" font-size="22" font-weight="300" fill="#8b949e" letter-spacing="-0.3">scripts</text>
    <text x="0" y="50" font-size="9" font-weight="500" fill="#58a6ff" letter-spacing="2.5" text-transform="uppercase">ONE-COMMAND DEPLOY</text>
  </g>
</svg>
